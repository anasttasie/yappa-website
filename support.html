<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yappa — Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand-font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
      --text-white: #FFFFFF;
      --text-soft: rgba(255, 255, 255, 0.85);
      --text-muted: rgba(255, 255, 255, 0.7);
      --accent: #d0d981;
      --cream: #F5EDE3;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--brand-font);
      color: var(--text-white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1, h2 {
      font-weight: 300;
      letter-spacing: -1.6px;
    }

    .bg-wrap {
      position: fixed;
      inset: 0;
      z-index: -1;
    }
    .bg-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 80px;
      text-align: center;
    }

    .brand {
      font-size: clamp(36px, 8vw, 52px);
      color: var(--text-white);
      margin-bottom: 40px;
      text-decoration: none;
      display: inline-block;
    }

    .section {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 0;
    }

    .section-title {
      font-size: 20px;
      color: var(--text-white);
      margin-bottom: 16px;
      text-transform: lowercase;
    }

    .section p {
      font-size: 17px;
      color: var(--text-soft);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .section a {
      color: var(--text-white);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .back-link {
      display: inline-block;
      margin-top: 32px;
      font-size: 15px;
      color: var(--text-muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text-white); }

    .footer {
      margin-top: auto;
      padding-top: 48px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .footer a {
      color: var(--text-white);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .footer a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="bg-wrap">
    <img src="aura_bg_2.jpg" alt="">
  </div>

  <main class="page">
    <a href="index.html" class="brand">yappa</a>

    <section class="section">
      <h2 class="section-title">support</h2>
      <p>if you're having any problems, questions, or feedback, we'd love to hear from you!</p>
      <p>please contact <a href="mailto:anastasia@yappa.life">anastasia@yappa.life</a></p>
    </section>

    <footer class="footer">
      <p>Yappa Ltd · <a href="mailto:anastasia@yappa.life">anastasia@yappa.life</a></p>
    </footer>
  </main>
</body>
</html>
